worker_processes  1;

events {
    worker_connections  1024;
}

http {
    resolver 127.0.0.11 ipv6=off valid=30s;

    map $arg_sourceType $sync_backend {
        default http://batch-ingester:9090;
        "" http://batch-ingester:9090;
        alfresco http://batch-ingester:9090;
        nuxeo http://nuxeo-batch-ingester:9093;
    }

    server {

        listen *:80;

        client_max_body_size 0;

        set  $allowOriginSite *;
        proxy_pass_request_headers on;
        proxy_pass_header Set-Cookie;

        proxy_connect_timeout 600;
        proxy_send_timeout    600;
        proxy_read_timeout    600;
        send_timeout          600;

        proxy_next_upstream error timeout invalid_header http_500 http_502 http_503 http_504;
        proxy_redirect off;
        proxy_buffering off;
        proxy_set_header Host            $host:$server_port;
        proxy_set_header X-Real-IP       $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_pass_header Set-Cookie;

        # Block direct Solr API access
        location ~ ^(/.*/service/api/solr/.*)$    { return 403; }
        location ~ ^(/.*/s/api/solr/.*)$           { return 403; }
        location ~ ^(/.*/wcservice/api/solr/.*)$   { return 403; }
        location ~ ^(/.*/wcs/api/solr/.*)$         { return 403; }
        location ~ ^(/.*/proxy/alfresco/api/solr/.*)$ { return 403; }
        location ~ ^(/.*/-default-/proxy/alfresco/api/.*)$ { return 403; }

        # Batch Ingester — scope management and manual sync triggers
        location /api/sync {
            proxy_pass $sync_backend;
        }

        # Content Lake node status — ingestion state for selected nodes
        location /api/content-lake {
            proxy_pass http://batch-ingester:9090;
        }

        # RAG Service — preserves /api/rag prefix (controllers are at /api/rag/*)
        location /api/rag {
            proxy_pass http://rag-service:9091;
        }

        # Alfresco Control Center
        location /admin {
            proxy_pass http://control-center:8080;
        }

        # Alfresco Repository
        location /alfresco/ {
            proxy_pass http://alfresco:8080;
        }

        # API Explorer
        location /api-explorer/ {
            proxy_pass http://alfresco:8080;
        }

        location = /nuxeo {
            return 301 /nuxeo/;
        }

        # Nuxeo Web UI
        location /nuxeo/ {
            proxy_pass http://nuxeo:8080;
        }

        # Share
        location /share/ {
            proxy_pass http://share:8080;
        }

        # Custom ACA / Content Lake UI (catch-all)
        location / {
            proxy_pass http://content-app:8080;
        }
    }
}
