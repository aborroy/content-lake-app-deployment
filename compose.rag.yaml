services:
  batch-ingester:
    profiles:
      - full
      - alfresco
    build:
      context: "${CONTENT_LAKE_GIT_CONTEXT:-https://github.com/aborroy/content-lake-app.git#main}"
      dockerfile_inline: |
        # syntax=docker/dockerfile:1.7
        FROM maven:3.9.9-eclipse-temurin-21-alpine AS build
        WORKDIR /workspace
        COPY pom.xml .
        COPY common/pom.xml common/pom.xml
        COPY alfresco/pom.xml alfresco/pom.xml
        COPY nuxeo/pom.xml nuxeo/pom.xml
        COPY common/content-lake-repo-model/pom.xml common/content-lake-repo-model/pom.xml
        COPY common/content-lake-spi/pom.xml common/content-lake-spi/pom.xml
        COPY common/content-lake-core/pom.xml common/content-lake-core/pom.xml
        COPY common/rag-service/pom.xml common/rag-service/pom.xml
        COPY alfresco/content-lake-source-alfresco/pom.xml alfresco/content-lake-source-alfresco/pom.xml
        COPY alfresco/alfresco-batch-ingester/pom.xml alfresco/alfresco-batch-ingester/pom.xml
        COPY alfresco/alfresco-live-ingester/pom.xml alfresco/alfresco-live-ingester/pom.xml
        COPY nuxeo/content-lake-source-nuxeo/pom.xml nuxeo/content-lake-source-nuxeo/pom.xml
        COPY nuxeo/nuxeo-batch-ingester/pom.xml nuxeo/nuxeo-batch-ingester/pom.xml
        COPY nuxeo/nuxeo-live-ingester/pom.xml nuxeo/nuxeo-live-ingester/pom.xml
        RUN --mount=type=cache,target=/root/.m2 \
            mvn -q -DskipTests -pl alfresco/alfresco-batch-ingester -am dependency:go-offline
        COPY common/content-lake-spi/src common/content-lake-spi/src
        COPY common/content-lake-core/src common/content-lake-core/src
        COPY alfresco/content-lake-source-alfresco/src alfresco/content-lake-source-alfresco/src
        COPY alfresco/alfresco-batch-ingester/src alfresco/alfresco-batch-ingester/src
        RUN --mount=type=cache,target=/root/.m2 \
            mvn -q -DskipTests -pl alfresco/alfresco-batch-ingester -am package
        RUN mkdir -p /layers \
         && JAR="$$(ls -1 alfresco/alfresco-batch-ingester/target/*.jar | grep -v 'original' | head -n 1)" \
         && java -Djarmode=layertools -jar "$${JAR}" extract --destination /layers
        FROM eclipse-temurin:21-jre-alpine
        RUN addgroup -S app && adduser -S -G app app
        RUN mkdir -p /data && chown app:app /data
        WORKDIR /app
        COPY --from=build /layers/dependencies/ ./
        COPY --from=build /layers/snapshot-dependencies/ ./
        COPY --from=build /layers/spring-boot-loader/ ./
        COPY --from=build /layers/application/ ./
        USER app
        EXPOSE 9090
        HEALTHCHECK --interval=30s --timeout=5s --start-period=60s --retries=3 \
          CMD wget -qO- http://localhost:9090/actuator/health || exit 1
        ENV JAVA_TOOL_OPTIONS="-XX:MaxRAMPercentage=75 -XX:+UseContainerSupport -Dfile.encoding=UTF-8"
        ENTRYPOINT ["java","org.springframework.boot.loader.launch.JarLauncher"]
    environment:
      ACTIVEMQ_URL: ${CONTENT_LAKE_PERMISSION_SYNC_BROKER_URL:-tcp://activemq:61616}
      ACTIVEMQ_USER: ${ACTIVEMQ_USER}
      ACTIVEMQ_PASSWORD: ${ACTIVEMQ_PASSWORD}
      ALFRESCO_URL: http://alfresco:8080
      ALFRESCO_INTERNAL_USERNAME: ${ALFRESCO_ADMIN_USER}
      ALFRESCO_INTERNAL_PASSWORD: ${ALFRESCO_ADMIN_PASSWORD}
      HXPR_URL: http://hxpr-app:8080
      HXPR_REPOSITORY_ID: ${HXPR_REPOSITORY_ID}
      HXPR_TARGET_PATH: ${HXPR_TARGET_PATH}
      HXPR_IDP_TOKEN_URL: http://idp:8080/idp/connect/token
      HXPR_IDP_CLIENT_ID: ${HXPR_IDP_CLIENT_ID}
      HXPR_IDP_CLIENT_SECRET: ${HXPR_IDP_CLIENT_SECRET}
      HXPR_IDP_USERNAME: ${HXPR_IDP_USERNAME}
      HXPR_IDP_PASSWORD: ${HXPR_IDP_PASSWORD}
      CONTENT_LAKE_PERMISSION_SYNC_QUEUE_NAME: ${CONTENT_LAKE_PERMISSION_SYNC_QUEUE_NAME:-contentlake.acl.changed}
      TRANSFORM_URL: http://transform-core-aio:8090
      MODEL_RUNNER_URL: ${MODEL_RUNNER_URL:-http://model-runner.docker.internal}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-ai/mxbai-embed-large}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      alfresco:
        condition: service_healthy
      hxpr-app:
        condition: service_healthy
    networks:
      - stack

