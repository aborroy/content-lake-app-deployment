      context: "${CONTENT_LAKE_UI_GIT_CONTEXT:-https://github.com/aborroy/alfresco-content-lake-ui.git#main}"
      dockerfile: docker/Dockerfile
      args:
        ACA_TAG: ${ACA_TAG:-7.3.0}
    environment:
      APP_CONFIG_ECM_HOST: http://${SERVER_NAME:-localhost}:${PUBLIC_PORT:-8080}
      APP_CONFIG_RAG_URL: http://${SERVER_NAME:-localhost}:${PUBLIC_PORT:-8080}
