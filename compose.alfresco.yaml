services:
  postgres:
    image: postgres:${POSTGRES_TAG:-15.6}
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    command: postgres -c max_connections=200 -c log_min_messages=LOG
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - stack

  activemq:
    image: alfresco/alfresco-activemq:${ACTIVEMQ_TAG:-5.18-jre17-rockylinux8}
    networks:
      - stack

  alfresco:
    build:
      context: ./acs/alfresco
      args:
        ALFRESCO_TAG: ${ALFRESCO_CE_TAG:-25.3.0}
        CONTENT_LAKE_GIT_CONTEXT: ${CONTENT_LAKE_ACS_GIT_CONTEXT:-https://github.com/aborroy/alfresco-content-lake.git#main}
    environment:
      JAVA_TOOL_OPTIONS: >-
        -Dencryption.keystore.type=JCEKS
        -Dencryption.cipherAlgorithm=DESede/CBC/PKCS5Padding
        -Dencryption.keyAlgorithm=DESede
        -Dencryption.keystore.location=/usr/local/tomcat/shared/classes/alfresco/extension/keystore/keystore
        -Dmetadata-keystore.password=mp6yc0UD9e
        -Dmetadata-keystore.aliases=metadata
        -Dmetadata-keystore.metadata.password=oKIWzVdEdA
        -Dmetadata-keystore.metadata.algorithm=DESede
      JAVA_OPTS: >-
        -Ddb.username=${POSTGRES_USER}
        -Ddb.password=${POSTGRES_PASSWORD}
        -Ddb.driver=org.postgresql.Driver
        -Ddb.url=jdbc:postgresql://postgres:5432/${POSTGRES_DB}
        -Dalfresco_user_store.adminpassword=209c6174da490caeb422f3fa5a7ae634
        -Dsystem.preferred.password.encoding=bcrypt10
        -Dsolr.host=solr6
        -Dsolr.port=8983
        -Dsolr.port.ssl=8983
        -Dsolr.secureComms=secret
        -Dsolr.baseUrl=/solr
        -Dindex.subsystem.name=solr6
        -Dsolr.sharedSecret=${SOLR_SECRET}
        -Dalfresco.host=${SERVER_NAME:-localhost}
        -Dalfresco.port=${PUBLIC_PORT:-8080}
        -Dapi-explorer.url=http://${SERVER_NAME:-localhost}:${PUBLIC_PORT:-8080}/api-explorer
        -Dalfresco.protocol=http
        -Dshare.host=${SERVER_NAME:-localhost}
        -Dshare.port=${PUBLIC_PORT:-8080}
        -Dshare.protocol=http
        -Daos.baseUrlOverwrite=http://${SERVER_NAME:-localhost}:${PUBLIC_PORT:-8080}/alfresco/aos
        -Dmessaging.broker.url="failover:(nio://activemq:61616)?timeout=3000&jms.useCompression=true"
        -Ddeployment.method=DOCKER_COMPOSE
        -Dcsrf.filter.enabled=false
        -Dopencmis.server.override=true
        -Dopencmis.server.value=http://${SERVER_NAME:-localhost}:${PUBLIC_PORT:-8080}
        -DlocalTransform.core-aio.url=http://transform-core-aio:8090/
        -Dhttpclient.config.transform.connectionRequestTimeout=500000
        -Dalfresco.restApi.basicAuthScheme=true
        -Dauthentication.protection.enabled=false
        -XX:+UseG1GC -XX:+UseStringDeduplication
        -Dgoogledocs.enabled=false
        -Ddev.email.not.sent=true
        -XX:MinRAMPercentage=50 -XX:MaxRAMPercentage=80
    volumes:
      - alf-repo-data:/usr/local/tomcat/alf_data
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        - CMD
        - curl
        - -f
        - http://localhost:8080/alfresco/api/-default-/public/alfresco/versions/1/probes/-ready-
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 1m
    networks:
      - stack

  solr6:
    image: alfresco/alfresco-search-services:${SEARCH_CE_TAG:-2.0.17}
    environment:
      SOLR_ALFRESCO_HOST: alfresco
      SOLR_ALFRESCO_PORT: "8080"
      SOLR_SOLR_HOST: solr6
      SOLR_SOLR_PORT: "8983"
      SOLR_CREATE_ALFRESCO_DEFAULTS: alfresco,archive
      ALFRESCO_SECURE_COMMS: "secret"
      JAVA_TOOL_OPTIONS: >-
        -Dalfresco.secureComms.secret=${SOLR_SECRET}
    volumes:
      - solr-data:/opt/alfresco-search-services/data
    depends_on:
      alfresco:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/share"]
      interval: 20s
      timeout: 2s
      retries: 3
      start_period: 15s
    networks:
      - stack

  transform-core-aio:
    image: alfresco/alfresco-transform-core-aio:${TRANSFORM_ENGINE_TAG:-5.2.4}
    environment:
      JAVA_OPTS: >-
        -XX:MinRAMPercentage=50 -XX:MaxRAMPercentage=80
        -Dlogging.level.org.alfresco.transform=ERROR
        -Dlogging.level.org.alfresco.transform.router=ERROR
    networks:
      - stack

  share:
    image: alfresco/alfresco-share:${SHARE_TAG:-25.3.0}
    environment:
      CSRF_FILTER_ORIGIN: http://${SERVER_NAME:-localhost}:${PUBLIC_PORT:-8080}
      CSRF_FILTER_REFERER: http://${SERVER_NAME:-localhost}:${PUBLIC_PORT:-8080}/share/.*
      REPO_HOST: alfresco
      REPO_PORT: "8080"
      JAVA_OPTS: >-
        -XX:MinRAMPercentage=50 -XX:MaxRAMPercentage=80
        -Dalfresco.host=${SERVER_NAME:-localhost}
        -Dalfresco.port=${PUBLIC_PORT:-8080}
        -Dalfresco.context=alfresco
        -Dalfresco.protocol=http
    depends_on:
      alfresco:
        condition: service_healthy
    networks:
      - stack

  control-center:
    image: quay.io/alfresco/alfresco-control-center:${CONTROL_CENTER_TAG:-10.2.0}
    environment:
      APP_CONFIG_ECM_HOST: http://${SERVER_NAME:-localhost}:${PUBLIC_PORT:-8080}
      APP_CONFIG_AUTH_TYPE: BASIC
      APP_CONFIG_PROVIDER: ECM
      BASE_PATH: /admin
    depends_on:
      alfresco:
        condition: service_healthy
    networks:
      - stack

  proxy:
    image: nginx:stable-alpine
    ports:
      - target: 80
        published: "${PUBLIC_PORT:-8080}"
        host_ip: "${BIND_IP:-0.0.0.0}"
        protocol: tcp
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - alfresco
      - share
      - content-app
      - control-center
      - solr6
      - nuxeo
      - rag-service
      - batch-ingester
      - nuxeo-batch-ingester
    networks:
      - stack
