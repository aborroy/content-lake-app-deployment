name: content-lake-app

# ─── Shared infrastructure ────────────────────────────────────────────────────
networks:
  stack:
    driver: bridge

volumes:
  alf-repo-data:
  postgres-data:
  solr-data:
  mongodb-data:
  localstack-data:
  shared-file-store:
  nuxeo-live-audit-data:

# ─── Build secrets ────────────────────────────────────────────────────────────
secrets:
  hxpr_git_auth_token:
    environment: HXPR_GIT_AUTH_TOKEN
  maven_username:
    environment: MAVEN_USERNAME
  maven_password:
    environment: MAVEN_PASSWORD
  nexus_username:
    environment: NEXUS_USERNAME
  nexus_password:
    environment: NEXUS_PASSWORD

# ─── Compose modules ──────────────────────────────────────────────────────────
#
# Profiles:
#   alfresco  — Alfresco source (core services only)
#   nuxeo     — Nuxeo source only
#   full      — Alfresco + Nuxeo (core)
#   demo      — full + standalone demo UI at /

include:
  - compose.alfresco.yaml
  - compose.hxpr.yaml
  - compose.content-lake.yaml
  - compose.ui.yaml
