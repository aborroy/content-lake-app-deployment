name: alfresco-content-lake

include:
  - ./compose.alfresco.yaml
  - ./compose.hxpr.yaml
  - ./compose.rag.yaml

networks:
  stack:
    driver: bridge

volumes:
  alf-repo-data:
  postgres-data:
  solr-data:
  mongodb-data:
  localstack-data:
  shared-file-store:

secrets:
  hxpr_git_auth_token:
    environment: HXPR_GIT_AUTH_TOKEN
  maven_username:
    environment: MAVEN_USERNAME
  maven_password:
    environment: MAVEN_PASSWORD
  nexus_username:
    environment: NEXUS_USERNAME
  nexus_password:
    environment: NEXUS_PASSWORD
