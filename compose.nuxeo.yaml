# Nuxeo is built from the nuxeo-deployment companion project located at ../nuxeo-deployment.
# `docker compose up --build` in this directory will build the image from that source tree.
# See nuxeo-deployment/README.md for the build contract and pinned upstream ref.

services:
  nuxeo-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_PASSWORD: nuxeo
      POSTGRES_USER: nuxeo
      POSTGRES_DB: nuxeo
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nuxeo -d nuxeo"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    volumes:
      - nuxeo-db-data:/var/lib/postgresql/data
    networks:
      - stack

  nuxeo:
    build:
      context: ../nuxeo-deployment
      dockerfile: Dockerfile
      args:
        NUXEO_GIT_TRACK: ${NUXEO_GIT_TRACK}
        NUXEO_GIT_REF: ${NUXEO_GIT_REF}
        NUXEO_SOURCE_ARCHIVE_URL: ${NUXEO_SOURCE_ARCHIVE_URL}
        NUXEO_BUILD_THREADS: ${NUXEO_BUILD_THREADS:-6}
        NUXEO_WEBUI_GIT_REF: ${NUXEO_WEBUI_GIT_REF}
        NUXEO_WEBUI_VERSION: ${NUXEO_WEBUI_VERSION}
    image: nuxeo-deployment:nuxeo-local
    platform: linux/amd64
    depends_on:
      nuxeo-db:
        condition: service_healthy
    environment:
      NUXEO_DB_NAME: nuxeo
      NUXEO_DB_USER: nuxeo
      NUXEO_DB_PWD: nuxeo
      NUXEO_DB_HOST: nuxeo-db
      NUXEO_DB_PORT: 5432
      NUXEO_DB_TYPE: postgresql
      NUXEO_PACKAGES: "nuxeo-web-ui"
      NUXEO_DEV: "true"
      NUXEO_FORCE_CONF: "true"
      # Audit stream and Elasticsearch audit are disabled because this stack
      # does not include an Elasticsearch instance for Nuxeo.
      NUXEO_CUSTOM_PARAM: |-
        nuxeo.stream.audit.enabled=false
        audit.elasticsearch.enabled=false
    volumes:
      - nuxeo-data:/var/lib/nuxeo
      - nuxeo-config:/etc/nuxeo
    networks:
      - stack
