    environment:
      NUXEO_URL: http://host.docker.internal:8081/nuxeo
      NUXEO_USERNAME: ${NUXEO_USERNAME:-Administrator}
      NUXEO_PASSWORD: ${NUXEO_PASSWORD:-Administrator}
      NUXEO_SOURCE_ID: ${NUXEO_SOURCE_ID:-local}
      NUXEO_INCLUDED_ROOT_1: ${NUXEO_INCLUDED_ROOT_1:-/default-domain/workspaces}
      NUXEO_DISCOVERY_MODE: ${NUXEO_DISCOVERY_MODE:-CHILDREN}
      HXPR_URL: http://hxpr-app:8080
      HXPR_REPOSITORY_ID: ${HXPR_REPOSITORY_ID}
      HXPR_TARGET_PATH: ${HXPR_NUXEO_TARGET_PATH:-/nuxeo-sync}
      HXPR_IDP_TOKEN_URL: http://idp:8080/idp/connect/token
      HXPR_IDP_CLIENT_ID: ${HXPR_IDP_CLIENT_ID}
      HXPR_IDP_CLIENT_SECRET: ${HXPR_IDP_CLIENT_SECRET}
      HXPR_IDP_USERNAME: ${HXPR_IDP_USERNAME}
      HXPR_IDP_PASSWORD: ${HXPR_IDP_PASSWORD}
